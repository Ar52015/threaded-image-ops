repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Linter
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff Formatter
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: MyPy Type Checker
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Python tests
        entry: bash -c 'uv run pytest --benchmark-disable -v || test $? -eq 5'
        language: system
        pass_filenames: false

      - id: clang-format
        name: Clang Format
        entry: clang-format -i
        language: system
        types_or: [c, c++]

      - id: clang-tidy
        name: Clang lint
        entry: clang-tidy --fix
        language: system
        types_or: [c, c++]

      - id: ctest
        name: C++ Tests
        entry: ctest --test-dir build --output-on-failure
        language: system
        types_or: [c, c++]
